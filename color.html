<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Coolors Palette</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 20px;
    }

    .color-list {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .color-item {
      width: 120px;
    }

    .swatch {
      width: 100%;
      height: 80px;
      border-radius: 8px;
      margin-bottom: 8px;
      border: 1px solid #ccc;
    }

    .label {
      font-size: 14px;
    }
  </style>
</head>
<body>

  <!-- Coolors Widget -->
  <script src="https://coolors.co/palette-widget/widget.js"></script>
  <script data-id="045219073469850835">
    new CoolorsPaletteWidget("045219073469850835", ["800020","cb534b","dca1a1","dacbbf","413533"]);
  </script>

  <!-- Custom Labels -->
  <div class="color-list">
    <div class="color-item">
      <div class="swatch" style="background:#800020;"></div>
      <div class="label">Burgundy (#800020)</div>
    </div>

    <div class="color-item">
      <div class="swatch" style="background:#cb534b;"></div>
      <div class="label">Terracotta Red (#CB534B)</div>
    </div>

    <div class="color-item">
      <div class="swatch" style="background:#dca1a1;"></div>
      <div class="label">Desert Rose (#DCA1A1)</div>
    </div>

    <div class="color-item">
      <div class="swatch" style="background:#dacbbf;"></div>
      <div class="label">Sand Dollar (#DACBBF)</div>
    </div>

    <div class="color-item">
      <div class="swatch" style="background:#413533;"></div>
      <div class="label">Charcoal Brown (#413533)</div>
    </div>
  </div>

</body>
</html>
