<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wedding Palette 1</title>
</head>
<body style="margin:0;padding:24px;font-family:Arial,sans-serif;background:#ffffff;color:#222;">
  <div style="display:grid;grid-template-columns:repeat(2,minmax(150px,1fr));gap:18px;max-width:420px;margin:0 auto;">
    <div style="border-radius:16px;overflow:hidden;background:#fff;border:1px solid #e8e8e8;box-shadow:0 4px 14px rgba(0,0,0,0.06);">
      <div style="height:120px;width:100%;background:#800020;"></div>
      <div style="padding:14px 14px 16px;">
        <p style="font-size:15px;font-weight:700;margin:0 0 6px;">Burgundy</p>
        <p style="font-size:13px;color:#666;margin:0;font-family:monospace;">#800020</p>
      </div>
    </div>

    <div style="border-radius:16px;overflow:hidden;background:#fff;border:1px solid #e8e8e8;box-shadow:0 4px 14px rgba(0,0,0,0.06);">
      <div style="height:120px;width:100%;background:#CB534B;"></div>
      <div style="padding:14px 14px 16px;">
        <p style="font-size:15px;font-weight:700;margin:0 0 6px;">Terracotta</p>
        <p style="font-size:13px;color:#666;margin:0;font-family:monospace;">#CB534B</p>
      </div>
    </div>
  </div>
</body>
</html>
